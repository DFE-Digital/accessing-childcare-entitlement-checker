name: PR Checks

on:
  workflow_dispatch:
  pull_request:

jobs:
  lint:
    name: Lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
      
      - name: Restore
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode
      
      - name: dotnet format
        run: dotnet format AccessingChildcareEntitlementChecker.sln --verify-no-changes --no-restore

  build:
    name: Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Restore
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode

      - name: Build (Release)
        run: dotnet build AccessingChildcareEntitlementChecker.sln --configuration Release --no-restore

      - name: Upload built outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          if-no-files-found: error
          path: |
            artifacts/bin/**

  unit-tests:
    name: Tests (Unit)
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts/bin

      - name: Restore
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode

      - name: Unit tests + collect coverage (no build)
        run: >
          dotnet test tests/AccessingChildcareEntitlementChecker.UnitTests/AccessingChildcareEntitlementChecker.UnitTests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage;Format=cobertura"
          --logger "trx;LogFileName=unit.trx"
          --results-directory ./TestResults/unit

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f # v2.6.0
        with:
          name: Tests (Unit) - Details
          path: TestResults/unit/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload test + coverage outputs for gating
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testresults-unit
          path: TestResults/unit/**

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      MIN_LINE_COVERAGE: "5"
    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: testresults-unit
          path: TestResults/unit

      - name: Sanity check test outputs exist
        run: |
          tree -d
          ls -la TestResults/unit

      - name: Generate coverage report and gate
        uses: danielpalme/ReportGenerator-GitHub-Action@2a82782178b2816d9d6960a7345fdd164791b323 # v5.5.3
        with:
          reports: "TestResults/unit/**/coverage.cobertura.xml"
          targetdir: "coveragereport"
          reporttypes: "HtmlInline;MarkdownSummaryGithub;TextSummary"
          customSettings: "minimumCoverageThresholds:lineCoverage=${{ env.MIN_LINE_COVERAGE }}"

      - name: Add coverage to job summary
        run: cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coveragereport
          path: coveragereport

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Install SonarCloud scanners
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install SonarCloud coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Build, Test and Analyze
        working-directory: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:DFE-Digital_accessing_childcare_entitlement_checker \
            /o:dfe-digital \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
            /d:sonar.coverage.exclusions=**/Program.cs,**/*.html,**/*.json,**/*.scss,**/wwwroot/** \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.dotnet.excludeTestProjects=true \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.scanner.scanAll=false
          dotnet build --no-incremental
          dotnet-coverage collect --settings dotnet-cover-config.xml -f xml -o coverage.xml "dotnet test"
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
