name: PR Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Restore
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode

      - name: dotnet format
        run: dotnet format AccessingChildcareEntitlementChecker.sln --verify-no-changes --no-restore

  verify:
    name: Build, Tests & SonarCloud
    permissions:
      contents: read
      checks: write
      pull-requests: read
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Cache SonarCloud packages
        uses: actions/cache@v5.0.3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-packages

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5.0.3
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:DFE-Digital_accessing-childcare-entitlement-checker \
            /o:dfe-digital \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.dotnet.excludeTestProjects=true \
            /d:sonar.cs.opencover.reportsPaths="TestResults/unit/**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/Program.cs,**/*.html,**/*.json,**/*.scss,**/wwwroot/**" \
            /d:sonar.scanner.scanAll=false

      - name: Restore
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode

      - name: Build (Release)
        run: dotnet build AccessingChildcareEntitlementChecker.sln --configuration Release --no-restore

      - name: Unit tests + collect coverage
        run: >
          dotnet test tests/AccessingChildcareEntitlementChecker.UnitTests/AccessingChildcareEntitlementChecker.UnitTests.csproj
          --configuration Release
          --no-build
          --results-directory ./TestResults/unit
          --logger "trx;LogFileName=unit.trx"
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format="opencover,cobertura"

      - name: End SonarCloud analysis
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f # v2.6.0
        with:
          name: Tests (Unit) - Details
          path: TestResults/unit/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload test + coverage outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testresults-unit
          if-no-files-found: error
          path: TestResults/unit/**

      - name: Upload built outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          if-no-files-found: error
          path: |
            artifacts/bin/**

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: verify
    env:
      MIN_LINE_COVERAGE: "5"
    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v8
        with:
          name: testresults-unit
          path: TestResults/unit

      - name: Generate coverage report and gate
        uses: danielpalme/ReportGenerator-GitHub-Action@2a82782178b2816d9d6960a7345fdd164791b323 # v5.5.3
        with:
          reports: "TestResults/unit/**/coverage.opencover.xml"
          targetdir: "coveragereport"
          reporttypes: "HtmlInline;MarkdownSummaryGithub;TextSummary"
          customSettings: "minimumCoverageThresholds:lineCoverage=${{ env.MIN_LINE_COVERAGE }}"

      - name: Add coverage to job summary
        run: cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coveragereport
          path: coveragereport