name: PR Checks

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
      
      - name: Restore
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode
      
      - name: dotnet format
        run: dotnet format AccessingChildcareEntitlementChecker.sln --verify-no-changes --no-restore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Restore
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode

      - name: Build (Release)
        run: dotnet build AccessingChildcareEntitlementChecker.sln --configuration Release --no-restore

      - name: Upload built outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          if-no-files-found: error
          path: |
            artifacts/bin/**

  unit-tests:
    name: Tests (Unit)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts/bin

      - name: Restore
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode

      - name: Unit tests + collect coverage (no build)
        run: >
          dotnet vstest \
            artifacts/bin/AccessingChildcareEntitlementChecker.UnitTests/release/AccessingChildcareEntitlementChecker.UnitTests.dll \
            --collect:"XPlat Code Coverage;Format=cobertura" \
            --logger:"trx;LogFileName=unit.trx" \
            --ResultsDirectory:./TestResults/unit

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Tests (Unit) - Details
          path: TestResults/unit/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload test + coverage outputs for gating
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testresults-unit
          path: TestResults/unit/**

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      MIN_LINE_COVERAGE: "5"
    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: testresults-unit
          path: TestResults/unit

      - name: Sanity check test outputs exist
        run: |
          tree -d
          ls -la TestResults/unit

      - name: Generate coverage report and gate
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: "TestResults/unit/**/coverage.cobertura.xml"
          targetdir: "coveragereport"
          reporttypes: "HtmlInline;MarkdownSummaryGithub;TextSummary"
          customSettings: "minimumCoverageThresholds:lineCoverage=${{ env.MIN_LINE_COVERAGE }}"

      - name: Add coverage to job summary
        run: cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coveragereport
          path: coveragereport