name: Build and test

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-and-test:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Restore dependencies
        run: dotnet restore AccessingChildcareEntitlementChecker.sln --locked-mode

      - name: Lint
        run: dotnet format AccessingChildcareEntitlementChecker.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build AccessingChildcareEntitlementChecker.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/AccessingChildcareEntitlementChecker.UnitTests/AccessingChildcareEntitlementChecker.UnitTests.csproj --configuration Release --no-build

      - name: Terraform Format
        working-directory: src/infrastructure
        run: terraform fmt -check 

      - name: Terraform init
        working-directory: src/infrastructure
        run: |
          terraform init

      - name: Terraform validate
        working-directory: src/infrastructure
        run: |
          terraform validate

      - name: Terraform plan
        working-directory: src/infrastructure
        run: |
          terraform plan -input=false

      - name: Publish web app
        run: dotnet publish src/AccessingChildcareEntitlementChecker.Web/AccessingChildcareEntitlementChecker.Web.csproj --configuration Release --output publish

      - name: Zip publish output
        run: |
          cd publish
          zip -r ../webapp.zip .

      - name: Upload web app artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: webapp.zip

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref, 'refs/heads/')
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web app artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Not yet used - these are the prefixes we would use for resources to deploy "feature stacks" from multiple branches.
      - name: Compute resource names
        id: stack-names
        run: |
          branch_raw="${{ github.ref_name }}"
          branch_slug=$(echo "$branch_raw" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')

          if [ -z "$branch_slug" ]; then
            branch_slug="branch"
          fi

          branch_slug=$(echo "$branch_slug" | cut -c1-20)
          branch_hash=$(echo -n "$branch_raw" | sha256sum | cut -c1-8)
          
          web_app_name="acec-$branch_slug-$branch_hash"
          echo "web_app_name=$web_app_name" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: src/infrastructure
        run: |
          terraform init

      # TODO - apply & deploy once Azure account is available