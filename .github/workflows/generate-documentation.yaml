name: Generate Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '**.tf' # Triggers when any Terraform file changes
      - '.github/workflows/generate-documentation.yaml'

permissions:
  contents: write

env:
  TERRAFORM_DOCS_VERSION: 0.17.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 1. INSTALL TERRAFORM-DOCS (Direct Copy from Care-Leavers) ---
      - name: Install terraform-docs
        run: |
          wget https://github.com/terraform-docs/terraform-docs/releases/download/v${{ env.TERRAFORM_DOCS_VERSION }}/terraform-docs-v${{ env.TERRAFORM_DOCS_VERSION }}-linux-amd64.tar.gz
          tar -xvf terraform-docs-v${{ env.TERRAFORM_DOCS_VERSION }}-linux-amd64.tar.gz terraform-docs
          sudo mv terraform-docs /usr/local/bin/
          rm terraform-docs-v${{ env.TERRAFORM_DOCS_VERSION }}-linux-amd64.tar.gz

      # --- 2. GENERATE INFRASTRUCTURE DOCS ---
      # Matches the Care-Leavers pattern of generating a table into the docs folder
      - name: Run terraform-docs
        run: |
          terraform-docs markdown table . > docs/infrastructure/terraform.md

      # --- 3. BUILD MKDOCS SITE ---
      - name: Set up Python
        uses: azure/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install mkdocs-material pymdown-extensions

      - name: Build and Deploy to GitHub Pages
        run: |
          # The --force flag ensures it overwrites the gh-pages branch as per DfE standard
          mkdocs gh-deploy --force