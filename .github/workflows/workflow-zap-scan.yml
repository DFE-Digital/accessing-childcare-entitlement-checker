name: OWASP ZAP Full Scan

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  zap-scan:
    name: Run ZAP Scan
    environment:
      name: development
      deployment: false
    runs-on: ubuntu-latest
    
    env:
      RESOURCE_GROUP: s279${{ vars.TF_VAR_PREFIX }}rg-uks-cec-web
      FD_PROFILE: s279${{ vars.TF_VAR_PREFIX }}-uks-cec-web-fd-profile
      FD_ENDPOINT: s279${{ vars.TF_VAR_PREFIX }}-uks-cec-web-fd-endpoint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Azure Frontdoor URL
        id: get-url
        env:
          RG: ${{ env.RESOURCE_GROUP }}
          PROFILE: ${{ env.FD_PROFILE }}
          ENDPOINT: ${{ env.FD_ENDPOINT }}
        run: |
          set -euo pipefail
          FRONTDOOR_URL=$(az afd custom-domain list -g "$RG" --profile-name "$PROFILE" --query "[0].hostName" -o tsv)
          if [ -z "$FRONTDOOR_URL" ]; then
            FRONTDOOR_URL=$(az afd endpoint show -g "$RG" --profile-name "$PROFILE" --endpoint-name "$ENDPOINT" --query "hostName" -o tsv)
          fi
          if [ -z "$FRONTDOOR_URL" ]; then
            echo "::error::Could not determine Frontdoor URL"
            exit 1
          fi
          echo "TARGET_URL=https://$FRONTDOOR_URL/" >> ${GITHUB_ENV}

      - name: Build Basic Auth header
        env:
          DEVELOPMENT_BASIC_AUTH_PASSWORD: ${{ secrets.DEVELOPMENT_BASIC_AUTH_PASSWORD }}
        run: |
          AUTH=$(printf 'zap:%s' "$DEVELOPMENT_BASIC_AUTH_PASSWORD" | base64 -w0)
          echo "AUTH_HEADER=Basic ${AUTH}" >> $GITHUB_ENV

      - name: Run OWASP ZAP Full Scan
        env:
          T_URL: ${{ env.TARGET_URL }}
          A_HEADER: ${{ env.AUTH_HEADER }}
        run: |
          docker run --rm \
            -u root \
            -v "${{ github.workspace }}/zap:/zap/wrk/zap:rw" \
            -e TARGET_URL="$T_URL" \
            -e AUTH_HEADER="$A_HEADER" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap/automation-plan.yaml

      - name: Post-process ZAP Markdown Report
        if: always()
        run: |
          if [ -f zap/zap-report.md ]; then
            # Remove all lines before the first H2 header
            sed -n '/^## /,$p' zap/zap-report.md > zap/zap-report-tmp.md
            mv zap/zap-report-tmp.md zap/zap-report.md

            # Prepend frontmatter
            echo "---" > zap/frontmatter.txt
            echo "title: ZAP by Checkmarx Scanning Report" >> zap/frontmatter.txt
            echo "eleventyNavigation:" >> zap/frontmatter.txt
            echo "  key: Scanning Report" >> zap/frontmatter.txt
            echo "order: 2" >> zap/frontmatter.txt
            echo "---" >> zap/frontmatter.txt
            echo "" >> zap/frontmatter.txt
            cat zap/frontmatter.txt zap/zap-report.md > zap/zap-report-processed.md
            mv zap/zap-report-processed.md zap/zap-report.md
            rm zap/frontmatter.txt
          fi

      - name: Post-process SARIF for GitHub
        if: always()
        env:
          T_URL: ${{ env.TARGET_URL }}
        run: |
          if [ -f zap/zap-results.sarif.json ]; then
            # GitHub uses shortDescription.text for the title and security-severity for the risk level.
            # We enrich the SARIF metadata so it shows descriptive names instead of "ZAP Medium Issue".
            # We also explicitly set the tool name and organization to "OWASP ZAP".
            jq --arg target "$T_URL" '
              .runs[].tool.driver |= (
                . + {
                  "name": "OWASP ZAP",
                  "fullName": "OWASP Zed Attack Proxy",
                  "organization": "OWASP",
                  "informationUri": "https://www.zaproxy.org/"
                } |
                .rules |= map(
                  . + { 
                    "shortDescription": { "text": (.name // "ZAP \(.id)") },
                    "properties": (.properties + { 
                      "security-severity": (
                        if .defaultConfiguration.level == "error" then "8.0" 
                        elif .defaultConfiguration.level == "warning" then "5.0" 
                        else "2.0" end
                      )
                    })
                  }
                )
              ) |
              walk(if type == "object" and has("uri") and (.uri | type == "string") then
                if .uri | startswith($target) then .uri |= sub($target; "") | .uri |= (if . == "" then "/" else . end) else . end
              else . end)
            ' zap/zap-results.sarif.json > zap/zap-results-processed.sarif.json
          fi

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zap/zap-results-processed.sarif.json
          category: zap-dast-scan

      - name: Build findings snapshot
        if: success()
        run: |
          if [ -f zap/zap-results-processed.sarif.json ]; then
            jq '
              [ .runs[]?.results[]? | { ruleId: (.ruleId // "unknown") } ]
              | group_by(.ruleId) | map({ ruleId: .[0].ruleId, count: length }) | sort_by(.ruleId)
            ' zap/zap-results-processed.sarif.json > zap/findings.json
          fi

      - name: Noise Reduction & Report Prep
        id: noise-filter
        run: |
          if git diff --quiet zap/findings.json; then
            echo "No meaningful changes in findings. Discarding workspace changes."
            git checkout zap/findings.json
            echo "should_create_pr=false" >> $GITHUB_OUTPUT
          else
            echo "Meaningful changes detected. Preparing PR."
            cp zap/zap-report.md docs/testing/zap-report.md
            echo "should_create_pr=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.noise-filter.outputs.should_create_pr == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ github.token }}
          base: ${{ github.ref_name }}
          branch: zap-findings-updates
          delete-branch: true
          title: "security: OWASP ZAP security findings updated"
          labels: security
          commit-message: "security: update ZAP findings snapshot"
          body: |
            Automated OWASP ZAP scan detected changes in security findings.
            - **Target:** ${{ env.TARGET_URL }}
            - **Run ID:** ${{ github.run_id }}
            Please review the Security tab for details.
          add-paths: |
            zap/findings.json
            docs/testing/zap-report.md

      - name: Generate Step Summary
        if: always()
        env:
          T_URL: ${{ env.TARGET_URL }}
          REPO: ${{ github.repository }}
        run: |
          echo "### ZAP Scan Results for $T_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SARIF Alerts:** [View in Security tab](https://github.com/$REPO/security/code-scanning)" >> $GITHUB_STEP_SUMMARY
