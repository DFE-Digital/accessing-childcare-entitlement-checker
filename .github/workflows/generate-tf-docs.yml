name: Terraform Docs

on:
  workflow_call:
    inputs:
      terraform-directory:
        description: Path to Terraform root
        required: true
        type: string

      output-file:
        description: Markdown file containing BEGIN_TF_DOCS/END_TF_DOCS markers
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate:
    name: CI generate docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate Terraform documentation
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: ${{ inputs.terraform-directory }}
          config-file: ${{ github.workspace }}/.terraform-docs.yml
          output-file: ${{ github.workspace }}/${{ inputs.output-file }}
          output-method: inject
          git-push: "false"

      - name: Commit documentation updates
        run: |
          if git diff --quiet -- "${{ inputs.output-file }}"; then
            echo "No documentation changes detected"
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "${{ inputs.output-file }}"
          
          git commit -m "docs(terraform): update generated documentation [skip ci]"
          
          git push