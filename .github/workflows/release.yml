name: Release

on:
  push:
    branches:
      - release/**

  workflow_dispatch:

jobs:
  build-dotnet:
    uses: ./.github/workflows/build-dotnet.yml
    permissions:
      contents: read
      checks: write
      pull-requests: read
    with:
      publish: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-terraform:
    uses: ./.github/workflows/build-terraform.yml
    with:
      working-directory: infra/terraform
      create-package: true

  tests-e2e:
    name: Run e2e tests
    runs-on: ubuntu-latest
    needs: [build-dotnet, build-terraform]
    steps:
      - name: Run e2e tests
        run: |
          echo "Running e2e tests"

  tests-a11y:
    name: Run a11y tests
    runs-on: ubuntu-latest
    needs: [build-dotnet, build-terraform]
    steps:
      - name: Run a11y tests
        run: |
          echo "Running a11y tests"

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [tests-a11y, tests-e2e]
    environment:
      name: staging
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
    steps:
      - name: Deploy to Production
        run: |
          echo "Deploying to Production"
