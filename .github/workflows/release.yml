name: 'Release Orchestration (Dev -> Prod)'

on:
  workflow_dispatch:
  workflow_call:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read
  actions: read

jobs:

  deploy-test:
    name: 'Deploy to Test'
    # Ensure it only runs if the CI workflow was successful (or if triggered manually)
    if: github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run'
    # needs: deploy-dev
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: test
    secrets: inherit

 
  deploy-staging:
    name: 'Deploy to Staging'
    needs: deploy-test
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: staging
    secrets: inherit

