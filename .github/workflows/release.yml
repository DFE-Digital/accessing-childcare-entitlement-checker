name: 'Release Orchestration (Dev -> Prod)'

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  deploy-dev:
    name: 'Deploy to Dev'
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: development
    secrets: inherit


  deploy-test:
    name: 'Deploy to Test'
    needs: deploy-dev
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: test
    secrets: inherit

 
  deploy-staging:
    name: 'Deploy to Staging'
    needs: deploy-test
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: staging
    secrets: inherit

