name: Run E2E Tests

on:
  workflow_call:
    inputs:
      SUT:
        description: 'System Under Test URL. If empty, starts the app on the agent.'
        required: false
        type: string
        default: ''
      environment:
        description: 'Target Environment for secrets'
        required: false
        type: string
        default: ''
      browser:
        description: 'Browser type to run E2E tests against (chromium, firefox, webkit)'
        required: false
        type: string
        default: 'chromium'
    secrets:
      DEVELOPMENT_BASIC_AUTH_PASSWORD:
        required: false
jobs:
  run-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      deployment: false
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout Git metadata
        uses: actions/checkout@v7
        with:
          sparse-checkout: .
          sparse-checkout-cone-mode: false

      - name: Download metadata
        uses: actions/download-artifact@v8
        with:
          name: build-dotnet-metadata

      - name: Download web app
        uses: actions/download-artifact@v8
        with:
          name: web-app
          path: web-app

      - name: Download e2e tests
        uses: actions/download-artifact@v8
        with:
          name: e2e-tests

      - name: Unzip e2e tests
        run: unzip e2e-tests.zip

      - name: Parse metadata
        id: metadata
        run: |
          DOTNET_VERSION=$(jq -r '.dotnetSdk' build-dotnet-metadata.json)
          echo "dotnet_version=$DOTNET_VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ steps.metadata.outputs.dotnet_version }}

      - name: Set execution permissions
        run: chmod +x ./e2e-tests/AccessingChildcareEntitlementChecker.E2eTests

      - name: Install Playwright Browsers
        working-directory: e2e-tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
        run: pwsh playwright.ps1 install --with-deps ${{ inputs.browser }}

      - name: Start app
        if: inputs.SUT == ''
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          dotnet ./web-app/AccessingChildcareEntitlementChecker.Web.dll --urls http://127.0.0.1:5252 > app.log 2>&1 &
          echo $! > app.pid
          echo "APP_STARTED=true" >> $GITHUB_ENV
          echo "TARGET_URL=http://127.0.0.1:5252/" >> $GITHUB_ENV

      - name: Set SUT URL
        if: inputs.SUT != ''
        env:
          SUT_URL: ${{ inputs.SUT }}
        run: |
          echo "TARGET_URL=$SUT_URL" >> $GITHUB_ENV

      - name: Wait for app
        if: env.APP_STARTED == 'true'
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5252/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start in time"
          cat app.log
          exit 1

      - name: Run E2E tests
        id: test
        env:
          TEST_URL: ${{ env.TARGET_URL }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
          TEST_BASIC_AUTH_PASSWORD: ${{ secrets.DEVELOPMENT_BASIC_AUTH_PASSWORD }}
          PLAYWRIGHT_BROWSER: ${{ inputs.browser }}
        run: |
          dotnet test ./e2e-tests/AccessingChildcareEntitlementChecker.E2eTests.dll \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --verbosity normal \
            -- RunConfiguration.MaxCpuCount=1

      - name: Stop app
        if: always() && env.APP_STARTED == 'true'
        run: |
          kill "$(cat app.pid)" || true

      - name: Publish E2E test results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2
        with:
          name: E2E Test Results (${{ inputs.browser }})
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Add E2E summary
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.test.outcome }}
          TARGET_URL: ${{ env.TARGET_URL }}
        run: |
          test_icon="❔"
          if [ "$TEST_OUTCOME" = "success" ]; then test_icon="✅"; fi
          if [ "$TEST_OUTCOME" = "failure" ]; then test_icon="❌"; fi
          
          echo "## 🧪 E2E Test Report (${{ inputs.browser }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Area | Status | Target | Browser |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | $test_icon | $TARGET_URL | ${{ inputs.browser }} |" >> $GITHUB_STEP_SUMMARY
