name: 'CEC Infrastructure Deployment'

on:
  workflow_call:
  # TODO: once we actually deploy; the below won't work without providing an artifact
  workflow_dispatch:
  schedule:
    # Runs at minute 0 of every 4th hour (00:00, 04:00, etc. UTC)
    # This acts as your 'Plan A' to catch capacity in UK South automatically.
    - cron: '0 */4 * * *'

jobs:
  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./src/infrastructure/terraform

    env:
      # Authentication Secrets (Ensure these match your GitHub Secrets names)
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      
      # Backend Configuration
      BACKEND_RG: "s279d01rg-weu-childcare-mgmt"
      BACKEND_STORAGE: "s279d01stchildcare"
      BACKEND_CONTAINER: "tfstate"
      BACKEND_KEY: "accessing-childcare-entitlement-checker.tfstate"

      # Terraform Variables
      TF_VAR_environment_prefix: "d01"
      TF_VAR_aspnetcore_environment: "staging"
      TF_VAR_elz_environment: "dev"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Download web app artifact
      # TODO: could potentially remove this if always running from workflow_call
      if: github.event_name == 'workflow_call'
      uses: actions/download-artifact@v8
      with:
        name: webapp-package
        path: ./artifacts/webapp-package

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false
        terraform_version: 1.10.4 # Aligned with DfE care-leavers repo

    - name: Azure Login
      uses: azure/login@v2
      with:
        # Inspired by DfE care-leavers: using the JSON creds block is more robust
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    # Not yet used - these are the prefixes we would use for resources to deploy ephemeral environments for multiple branches.
    - name: Compute resource names
      id: stack-names
      run: |
        branch_raw="${{ github.ref_name }}"
        branch_slug=$(echo "$branch_raw" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')

        if [ -z "$branch_slug" ]; then
            branch_slug="branch"
        fi

        branch_slug=$(echo "$branch_slug" | cut -c1-20)
        branch_hash=$(echo -n "$branch_raw" | sha256sum | cut -c1-8)

        web_app_name="acec-$branch_slug-$branch_hash"
        echo "web_app_name=$web_app_name" >> "$GITHUB_OUTPUT"

    - name: Terraform Format
      run: terraform fmt -check 

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=$BACKEND_RG" \
          -backend-config="storage_account_name=$BACKEND_STORAGE" \
          -backend-config="container_name=$BACKEND_CONTAINER" \
          -backend-config="key=$BACKEND_KEY"

    - name: Terraform validate
      run: |
        terraform validate

    - name: Terraform Plan
      run: terraform plan -no-color -out=main.tfplan

    - name: Terraform Apply
      run: terraform apply -auto-approve main.tfplan
