    #     DEPLOY_URL="https://${{ steps.tf-outputs.outputs.web_app_name }}-${{ steps.tf-outputs.outputs.web_app_slot_name }}.azurewebsites.net"
    #     {
    #       echo "## Deployment"
    #       echo
    #       echo "- Resource group: \`${{ steps.tf-outputs.outputs.resource_group_name }}\`"
    #       echo "- Web app: \`${{ steps.tf-outputs.outputs.web_app_name }}\`"
