name: 'CEC Infrastructure Deployment'

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: string
        default: development

jobs:
  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ./src/infrastructure/terraform

    permissions:
      id-token: write
      contents: read

    env:
      # OIDC Authentication
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      
      # Backend Configuration
      BACKEND_RG: ${{ secrets.TF_BACKEND_RG }}
      BACKEND_STORAGE: ${{ secrets.TF_BACKEND_STORAGE }}
      BACKEND_CONTAINER: "tfstate"
      BACKEND_KEY: ${{ secrets.TF_BACKEND_KEY }}
      
      # Pathing for Artifacts
      DEPLOY_ZIP_PATH: "../../../artifacts/webapp-package/webapp.zip"

      # Terraform Variables
      TF_VAR_environment_prefix: ${{ vars.TF_VAR_PREFIX }}
      TF_VAR_elz_environment: ${{ vars.TF_VAR_ELZ_ENV }}
      TF_VAR_aspnetcore_environment: ${{ inputs.environment == 'development' && 'Development' || inputs.environment == 'test' && 'Staging' || inputs.environment == 'staging' && 'Staging' || 'Production' }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Download web app artifact
      uses: actions/download-artifact@v8
      with:
        name: webapp-package
        path: ./artifacts/webapp-package

    - name: Azure Login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false
        terraform_version: 1.10.4

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=$BACKEND_RG" \
          -backend-config="storage_account_name=$BACKEND_STORAGE" \
          -backend-config="container_name=$BACKEND_CONTAINER" \
          -backend-config="key=$BACKEND_KEY" \
          -backend-config="use_oidc=true"

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -no-color -out=main.tfplan

    - name: Terraform Apply
      run: terraform apply -auto-approve main.tfplan

    - name: Read Terraform outputs
      id: tf-outputs
      run: |
        echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
        echo "web_app_name=$(terraform output -raw web_app_name)" >> "$GITHUB_OUTPUT"

    - name: Deploy package to Web App
      run: |
        az webapp deploy \
          --resource-group "${{ steps.tf-outputs.outputs.resource_group_name }}" \
          --name "${{ steps.tf-outputs.outputs.web_app_name }}" \
          --src-path "$DEPLOY_ZIP_PATH" \
          --type zip

    - name: Publish deployment summary
      run: |
        RESOURCE_GROUP="${{ steps.tf-outputs.outputs.resource_group_name }}"
        APP_NAME="${{ steps.tf-outputs.outputs.web_app_name }}"
        DEPLOY_URL="https://${APP_NAME}.azurewebsites.net"
        
        {
          echo "## Deployment Details"
          echo 
          echo "* **URL**: [${DEPLOY_URL}](${DEPLOY_URL})"
          echo "* **Resource Group**: ${RESOURCE_GROUP}"
          echo "* **Web App Name**: ${APP_NAME}"
        } >> "$GITHUB_STEP_SUMMARY"
