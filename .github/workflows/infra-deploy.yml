name: 'CEC Infrastructure Deployment'

on:
  push:
    branches:
      - 'feature/hk-ac-485-fed-cred' # temp change to test run

  workflow_call:
    # Optional: You can define inputs or secrets if you want the caller to provide them
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: string


  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        type: choice
        options:
          - development
          - test
          - staging
        default: development
 
jobs:
 terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    # Logic: Uses input if provided (manual/call), otherwise defaults based on branch
    environment: test
    #environment: ${{ inputs.environment || (github.ref == 'refs/heads/main' && 'test' || 'development') }}
   
    permissions:
      contents: read
      id-token: write # MANDATORY for Federated Credentials (OIDC)

    defaults:
      run:
        working-directory: ./src/infrastructure/terraform

    env:
      # OIDC Authentication (No Client Secret needed)
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true # Tells Terraform to use OIDC instead of Secret
      
      # Backend Configuration
      BACKEND_RG: ${{ secrets.TF_BACKEND_RG }}
      BACKEND_STORAGE: ${{ secrets.TF_BACKEND_STORAGE }}
      BACKEND_CONTAINER: "tfstate"
      BACKEND_KEY: ${{ secrets.TF_BACKEND_KEY }}
      DEPLOY_ZIP_PATH: "../../../artifacts/webapp-package/webapp.zip"

      # Terraform Variables
      TF_VAR_environment_prefix: "d01"
     # TF_VAR_aspnetcore_environment: "staging" # Updated for consistency
      TF_VAR_elz_environment: "development"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download web app artifact
      if: github.event_name == 'workflow_call'
      uses: actions/download-artifact@v4
      with:
        name: webapp-package
        path: ./artifacts/webapp-package

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false
        terraform_version: 1.10.4
        
    
    - name: OIDC Debug (Non-Sensitive)
      run: |
        echo "Attempting OIDC Auth for Environment: ${{ inputs.environment || 'development' }}"
        echo "Current Branch (Ref): ${{ github.ref }}"
        echo "Expected Subject: repo:${{ github.repository }}:ref:${{ github.ref }}"

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }} # todo: change the secret to be environment specific
        tenant-id: ${{ secrets.AZURE_TENANT_ID }} # todo: change the secret to be environment specific
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: 'Audit OIDC Subject'
      run: |
        if [ -n "${{ inputs.environment }}" ]; then
          echo "AUTHENTICATION TYPE: Environment-based"
          echo "SUBJECT CLAIM: repo:${{ github.repository }}:environment:${{ inputs.environment }}"
        else
          echo "AUTHENTICATION TYPE: Branch-based (Fallback)"
          echo "SUBJECT CLAIM: repo:${{ github.repository }}:ref:${{ github.ref }}"
        fi

    - name: Terraform Format
      run: terraform fmt -check 

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=$BACKEND_RG" \
          -backend-config="storage_account_name=$BACKEND_STORAGE" \
          -backend-config="container_name=$BACKEND_CONTAINER" \
          -backend-config="key=$BACKEND_KEY" \
          -backend-config="use_oidc=true"

    - name: Terraform validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -no-color -out=main.tfplan

    - name: Terraform Apply
      run: terraform apply -auto-approve main.tfplan

    - name: Read Terraform outputs
      if: github.event_name == 'workflow_call'
      id: tf-outputs
      run: |
        echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
        echo "web_app_name=$(terraform output -raw web_app_name)" >> "$GITHUB_OUTPUT"
        echo "web_app_slot_name=$(terraform output -raw web_app_slot_name)" >> "$GITHUB_OUTPUT"

    - name: Verify deploy package structure
      if: github.event_name == 'workflow_call'
      run: |
        unzip -l "$DEPLOY_ZIP_PATH" | head -n 200
        if ! unzip -l "$DEPLOY_ZIP_PATH" | awk '{print $4}' | grep -Eq '^[^/]+\.runtimeconfig\.json$'; then
          echo "Expected a .runtimeconfig.json at archive root, but none was found."
          exit 1
        fi

    - name: Deploy package to Web App
      if: github.event_name == 'workflow_call'
      run: |
        az webapp deploy \
          --resource-group "${{ steps.tf-outputs.outputs.resource_group_name }}" \
          --name "${{ steps.tf-outputs.outputs.web_app_name }}" \
          --slot "${{ steps.tf-outputs.outputs.web_app_slot_name }}" \
          --src-path "$DEPLOY_ZIP_PATH" \
          --type zip

    - name: Publish deployment summary
      if: github.event_name == 'workflow_call'
      run: |
        DEPLOY_URL="https://${{ steps.tf-outputs.outputs.web_app_name }}-${{ steps.tf-outputs.outputs.web_app_slot_name }}.azurewebsites.net"
        {
          echo "## Deployment"
          echo
          echo "- Resource group: \`${{ steps.tf-outputs.outputs.resource_group_name }}\`"
          echo "- Web app: \`${{ steps.tf-outputs.outputs.web_app_name }}\`"
          echo "- Slot: \`${{ steps.tf-outputs.outputs.web_app_slot_name }}\`"
          echo "- URL: [${DEPLOY_URL}](${DEPLOY_URL})"
        } >> "$GITHUB_STEP_SUMMARY"
