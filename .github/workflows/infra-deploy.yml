name: 'CEC Infrastructure Deployment'

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: string
        default: development
      run-id:
        description: 'Workflow Run ID to download artifacts from'
        required: false
        type: string
        default: ''  
jobs:
  lint-terraform:
    name: Lint Terraform
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_wrapper: false
          terraform_version: 1.10.4

      - name: Terraform Format
        run: terraform fmt -check 

  terraform:
    name: 'Terraform Plan & Apply'
    runs-on: ubuntu-latest
    needs: lint-terraform
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      actions: read

    defaults:
      run:
        working-directory: ./infra/terraform

    env:
      # OIDC Authentication
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      
      # Pathing for Artifacts
      DEPLOY_ZIP_PATH: "../../artifacts/webapp-package/webapp.zip"

      TF_VAR_development_basic_auth_password: ${{ secrets.DEVELOPMENT_BASIC_AUTH_PASSWORD }} 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Download web app artifact
      uses: actions/download-artifact@v8
      with:
        name: webapp-package
        path: ./artifacts/webapp-package
        run-id: ${{ inputs.run-id || github.run_id }}
        github-token: ${{ github.token }}

    - name: Azure Login (OIDC)
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
      with:
        terraform_wrapper: false
        terraform_version: 1.10.4

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="environments/${{ inputs.environment }}.state.config"

    - name: Terraform Validate
      run: |
        terraform validate

    - name: Terraform Plan
      run: terraform plan -no-color -out=main.tfplan -var-file="environments/${{ inputs.environment }}.tfvars"

    - name: Terraform Apply
      run: terraform apply -auto-approve main.tfplan

    - name: Read Terraform outputs
      id: tf-outputs
      run: |
        echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
        echo "web_app_name=$(terraform output -raw web_app_name)" >> "$GITHUB_OUTPUT"
        echo "frontdoor_hostname=$(terraform output -raw frontdoor_hostname)" >> "$GITHUB_OUTPUT"

    - name: Deploy package to Web App
      run: |
        az webapp deploy \
          --resource-group "${{ steps.tf-outputs.outputs.resource_group_name }}" \
          --name "${{ steps.tf-outputs.outputs.web_app_name }}" \
          --src-path "$DEPLOY_ZIP_PATH" \
          --type zip

    - name: Publish deployment summary
      run: |
        RESOURCE_GROUP="${{ steps.tf-outputs.outputs.resource_group_name }}"
        APP_NAME="${{ steps.tf-outputs.outputs.web_app_name }}"
        FRONTDOOR_HOSTNAME="${{ steps.tf-outputs.outputs.frontdoor_hostname }}"
        DEPLOY_URL="https://${FRONTDOOR_HOSTNAME}"
        
        {
          echo "## Deployment Details"
          echo 
          echo "* **URL**: [${DEPLOY_URL}](${DEPLOY_URL})"
          echo "* **Front Door Hostname**: ${FRONTDOOR_HOSTNAME}"
          echo "* **Resource Group**: ${RESOURCE_GROUP}"
          echo "* **Web App Name**: ${APP_NAME}"
        } >> "$GITHUB_STEP_SUMMARY"
