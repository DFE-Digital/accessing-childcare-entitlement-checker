name: Release Pipeline

on:
  push:
    branches:
      - 'releases/**'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release branch
        id: branch
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          if [[ ! "$BRANCH" =~ ^releases/v([0-9]+)\.([0-9]+)$ ]]; then
            echo "Invalid release branch name: $BRANCH"
            echo "Expected format: releases/vX.X"
            exit 1
          fi

          echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"

      - name: Determine next patch version
        id: version
        shell: bash
        run: |
          PREFIX="v${{ steps.branch.outputs.major }}.${{ steps.branch.outputs.minor }}"

          git fetch --tags

          LATEST=$(
            git tag \
              -l "${PREFIX}.*" \
              --sort=-version:refname \
            | head -n 1
          )

          if [ -z "$LATEST" ]; then
            VERSION="${PREFIX}.0"
          else
            PATCH=$(( ${LATEST##*.} + 1 ))
            VERSION="${PREFIX}.${PATCH}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "Calculated version: $VERSION"

      - name: Create tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi

          git tag "$VERSION"
          git push origin "$VERSION"

  build-dotnet:
    name: Build Dotnet
    needs: version
    uses: ./.github/workflows/build-dotnet.yml
    with:
      publish: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-infra:
    name: Build Infrastructure
    needs: version
    uses: ./.github/workflows/build-infra.yml
    with:
      infra-directory: infra
      publish: true

  deploy-stage:
    name: Deploy Staging
    needs: [version, build-dotnet, build-infra]
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment: staging
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      DEVELOPMENT_BASIC_AUTH_PASSWORD: ${{ secrets.DEVELOPMENT_BASIC_AUTH_PASSWORD }}

  e2e-tests:
    name: E2E Tests
    needs: [deploy-stage]
    uses: ./.github/workflows/run-e2e-tests.yml
    with:
      SUT: ${{ needs.deploy-stage.outputs.deploy_url }}
      environment: staging
    secrets:
      DEVELOPMENT_BASIC_AUTH_PASSWORD: ${{ secrets.DEVELOPMENT_BASIC_AUTH_PASSWORD }}

  a11y-tests:
    name: A11y Tests
    needs: [ deploy-stage ]
    uses: ./.github/workflows/run-a11y-tests.yml
    with:
      SUT: ${{ needs.deploy-stage.outputs.deploy_url }}
      environment: staging
    secrets:
      DEVELOPMENT_BASIC_AUTH_PASSWORD: ${{ secrets.DEVELOPMENT_BASIC_AUTH_PASSWORD }}



