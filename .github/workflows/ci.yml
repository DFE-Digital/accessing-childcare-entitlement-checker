name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
  pull_request:
    paths-ignore:
      - docs/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit

  e2e-tests:
    name: Tests (E2E)
    needs: build-and-test
    uses: ./.github/workflows/e2e-tests.yml

  deploy:
    name: Deploy
    needs: build-and-test
    if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'pull_request' && github.head_ref == 'feature/ac-501_deploy-to-test')
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: development
    secrets: inherit
