name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
  pull_request:
    paths-ignore:
      - docs/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit

  e2e-tests:
    name: Tests (E2E)
    needs: build-and-test
    uses: ./.github/workflows/e2e-tests.yml

  a11y-tests:
    name: Tests (Accessibility)
    needs: build-and-test
    permissions:
      contents: read
    uses: ./.github/workflows/a11y-tests.yml

  deploy:
    name: Deploy
    needs: build-and-test
    if: github.event_name == 'push' && github.ref_name == 'main'
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: development
    secrets: inherit
