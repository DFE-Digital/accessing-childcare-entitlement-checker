name: Promote Artifact

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options: [test, staging, production]
        default: test
      run-id:
        description: 'The CI Workflow Run ID to promote'
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        type: string
        default: test
      run-id:
        type: string
        required: true

permissions:
  id-token: write
  contents: read
  actions: read
  deployments: write 

jobs:
  validate-promotion:
    name: Verify Promotion Path
    runs-on: ubuntu-latest
    steps:
      - name: Check Prerequisite Environment
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ENV: ${{ inputs.environment }}
          RUN_ID: ${{ inputs.run-id }}
        run: |
          echo "--- PROMOTION DIAGNOSTICS ---"
          echo "Target Environment: $TARGET_ENV"
          echo "Validated Run ID: $RUN_ID"
          
          # Skip validation for 'test'
          if [ "$TARGET_ENV" == "test" ]; then
            echo "LOG: Bypassing linear gate checks for initial test environment."
            exit 0
          fi

          if [ "$TARGET_ENV" == "staging" ]; then PRE_REQ="test"; fi
          if [ "$TARGET_ENV" == "production" ]; then PRE_REQ="staging"; fi

          # Refined check inside the validate-promotion job
          STATUS=$(gh api repos/${{ github.repository }}/deployments \
            -f environment=$PRE_REQ \
            --jq ".[] | select(.payload.run_id == \"$RUN_ID\") | .id" | head -n 1 | xargs -I {} gh api repos/${{ github.repository }}/deployments/{}/statuses --jq ".[0].state" || echo "not_found")

          if [ "$STATUS" != "success" ]; then
            echo "!!! PROMOTION DENIED: $RUN_ID has not passed $PRE_REQ !!!"
            exit 1
          fi

  stage-artifact:
    name: Prepare artifact
    needs: validate-promotion
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          run-id: ${{ inputs.run-id }}
          github-token: ${{ github.token }}
          path: ./artifacts/webapp-package

      - name: Re-upload for deployment
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package-deployment
          path: ./artifacts/webapp-package/webapp.zip

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: stage-artifact
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit