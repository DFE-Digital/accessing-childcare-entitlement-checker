name: Promote Artifact

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options: [test, staging, production]
        default: test
      run-id:
        description: 'The CI Workflow Run ID to promote'
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        type: string
        default: test
      run-id:
        type: string
        required: true

permissions:
  id-token: write
  contents: read
  actions: read
  deployments: write 

jobs:
  validate-promotion:
    name: Verify Promotion Path
    runs-on: ubuntu-latest
    steps:
      - name: Check Prerequisite Environment
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ENV: ${{ inputs.environment }}
          RUN_ID: ${{ inputs.run-id }}
        run: |
         # 1. Retrieve the Deployment record
          DEPLOYMENT_ID=$(gh api -X GET "repos/${{ github.repository }}/deployments" \
            -f environment="$PRE_REQ" \
            -f sha="$RUN_SHA" \
            --jq ".[0].id")

          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" == "null" ]; then
            echo "Promotion Denied: No deployment record found for SHA $RUN_SHA in $PRE_REQ."
            exit 1
          fi

          # 2. Check for SUCCESS in the status history
          # Instead of picking the first one, we check if 'success' exists in the array of states
          ALL_STATUSES=$(gh api -X GET "repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses" \
            --jq ".[].state")

          echo "Found statuses for $PRE_REQ: $(echo $ALL_STATUSES | xargs)"

          if echo "$ALL_STATUSES" | grep -q "success"; then
            echo "✅ Validation successful: A successful deployment was found for $PRE_REQ."
          else
            echo "❌ Promotion Denied: No 'success' status found in history. Current states: $(echo $ALL_STATUSES | xargs)"
            exit 1
          fi
  stage-artifact:
    permissions:
      actions: read
      contents: read
    name: Prepare artifact
    needs: validate-promotion
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          run-id: ${{ inputs.run-id }}
          github-token: ${{ github.token }}
          path: ./artifacts/webapp-package

      - name: Re-upload for deployment
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package-deployment
          path: ./artifacts/webapp-package/webapp.zip

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: stage-artifact
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      run-id: ${{ inputs.run-id }}
    secrets: inherit