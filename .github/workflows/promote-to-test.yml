name: Promote Artifact

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options: [test, staging, production]
        default: test
      run-id:
        description: 'The CI Workflow Run ID to promote'
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        type: string
        default: test
      run-id:
        type: string
        required: true

permissions:
  id-token: write
  contents: read
  actions: read
  deployments: write 

jobs:
  validate-promotion:
    name: Verify Promotion Path
    runs-on: ubuntu-latest
    steps:
      - name: Check Prerequisite Environment
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ENV: ${{ inputs.environment }}
          RUN_ID: ${{ inputs.run-id }}
        run: |
          echo "========================================================="
          echo "📊 DEEP DIAGNOSTIC: PROMOTION GATE VERIFICATION"
          echo "========================================================="
          echo "Target Environment: $TARGET_ENV"
          echo "Input Run ID:       $RUN_ID"
          echo "Current Branch:     ${{ github.ref }}"
          echo "Current Context SHA: ${{ github.sha }}"

          if [ "$TARGET_ENV" == "test" ]; then
            echo "LOG: Bypassing gates for initial 'test' environment."
            exit 0
          fi

          # 1. Determine Prerequisite
          PRE_REQ=""
          if [ "$TARGET_ENV" == "staging" ]; then PRE_REQ="test"; fi
          if [ "$TARGET_ENV" == "production" ]; then PRE_REQ="staging"; fi
          echo "Requirement: Must have successfully passed environment: [$PRE_REQ]"

          # 2. Inspect the Run ID Metadata
          echo "--- 🔍 Inspecting Run ID: $RUN_ID ---"
          RUN_DATA=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID")
          RUN_SHA=$(echo "$RUN_DATA" | jq -r ".head_sha")
          RUN_STATUS=$(echo "$RUN_DATA" | jq -r ".conclusion")

          echo "Run ID SHA:    $RUN_SHA"
          echo "Run Conclusion: $RUN_STATUS"

          if [ "$RUN_SHA" == "null" ] || [ -z "$RUN_SHA" ]; then
            echo "❌ ERROR: Could not retrieve SHA for Run ID $RUN_ID. Is the ID correct?"
            exit 1
          fi

          # 3. List ALL Deployments for the Prerequisite Environment
          echo "--- 📋 Listing last 5 deployments for [$PRE_REQ] ---"
          ALL_DEPLOYS=$(gh api -X GET "repos/${{ github.repository }}/deployments" -f environment="$PRE_REQ" -f per_page=5)

          echo "DEBUG: Raw Deployment IDs and SHAs found in [$PRE_REQ]:"
          echo "$ALL_DEPLOYS" | jq -r '.[] | "ID: \(.id) | SHA: \(.sha) | Created: \(.created_at)"'

          # 4. Attempt to find the specific match
          echo "--- 🎯 Searching for match (SHA: $RUN_SHA) ---"
          DEPLOYMENT_ID=$(echo "$ALL_DEPLOYS" | jq -r ".[] | select(.sha == \"$RUN_SHA\") | .id" | head -n 1)

          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" == "null" ]; then
            echo "❌ FAILURE: No deployment found in [$PRE_REQ] matching SHA [$RUN_SHA]."
            echo "This means the code from Run $RUN_ID hasn't been deployed to $PRE_REQ yet,"
            echo "or it was deployed under a different environment name."
            exit 1
          fi

          echo "✅ MATCH FOUND: Deployment ID is $DEPLOYMENT_ID"

          # 5. Check Final Status
          echo "--- 🚦 Verifying Success Status ---"
          STATUS_DATA=$(gh api -X GET "repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses")
          LATEST_STATE=$(echo "$STATUS_DATA" | jq -r ".[0].state")

          echo "All statuses for this deployment:"
          echo "$STATUS_DATA" | jq -r '.[] | "- State: \(.state) | Created: \(.created_at)"'

          if [ "$LATEST_STATE" != "success" ]; then
            echo "❌ PROMOTION DENIED: Latest state is [$LATEST_STATE]. Expected [success]."
            exit 1
          fi

          echo "========================================================="
          echo "✅ GATE PASSED: Proceeding with promotion."
          echo "========================================================="
  stage-artifact:
    name: Prepare artifact
    needs: validate-promotion
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          run-id: ${{ inputs.run-id }}
          github-token: ${{ github.token }}
          path: ./artifacts/webapp-package

      - name: Re-upload for deployment
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package-deployment
          path: ./artifacts/webapp-package/webapp.zip

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: stage-artifact
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit