name: Promote Artifact

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options: [test, staging, production]
        default: test
      run-id:
        description: 'The CI Workflow Run ID to promote'
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        type: string
        default: test
      run-id:
        type: string
        required: true

permissions:
  id-token: write
  contents: read
  actions: read
  deployments: write 

jobs:
  validate-promotion:
    name: Verify Promotion Path
    runs-on: ubuntu-latest
    steps:
      - name: Check Prerequisite Environment
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_ENV: ${{ inputs.environment }}
          RUN_ID: ${{ inputs.run-id }}
        run: |
          # Set prerequisite mapping
          if [ "$TARGET_ENV" == "test" ]; then
            echo "Initial environment deployment: skipping prerequisite check."
            exit 0
          fi

          PRE_REQ="test"
          if [ "$TARGET_ENV" == "production" ]; then PRE_REQ="staging"; fi

          echo "Promoting Run ID: $RUN_ID to $TARGET_ENV"
          echo "Prerequisite check: verifying successful deployment in $PRE_REQ"

          # 1. Resolve the Commit SHA for the provided Run ID
          # This ensures we are validating the exact code bits from that specific run.
          RUN_SHA=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" --jq ".head_sha")

          if [ -z "$RUN_SHA" ] || [ "$RUN_SHA" == "null" ]; then
            echo "Error: Could not resolve SHA for Run ID $RUN_ID."
            exit 1
          fi

          # 2. Retrieve the Deployment record for the resolved SHA and environment
          # We filter by environment and SHA to ensure mathematical certainty.
          DEPLOYMENT_ID=$(gh api -X GET "repos/${{ github.repository }}/deployments" \
            -f environment="$PRE_REQ" \
            -f sha="$RUN_SHA" \
            --jq ".[0].id")

          if [ -z "$DEPLOYMENT_ID" ] || [ "$DEPLOYMENT_ID" == "null" ]; then
            echo "Promotion Denied: No deployment record found for SHA $RUN_SHA in $PRE_REQ."
            exit 1
          fi

          # 3. Verify the Deployment Status
          # We check that the latest status is 'success' before allowing the gate to open.
          STATUS=$(gh api -X GET "repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses" \
            --jq ".[0].state")

          if [ "$STATUS" != "success" ]; then
            echo "Promotion Denied: Deployment status for Run $RUN_ID in $PRE_REQ is '$STATUS'."
            exit 1
          fi

          echo "Validation successful: Run $RUN_ID is verified for promotion."
  stage-artifact:
    permissions:
      actions: read
      contents: read
    name: Prepare artifact
    needs: validate-promotion
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          run-id: ${{ inputs.run-id }}
          github-token: ${{ github.token }}
          path: ./artifacts/webapp-package

      - name: Re-upload for deployment
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package-deployment
          path: ./artifacts/webapp-package/webapp.zip

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: stage-artifact
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit