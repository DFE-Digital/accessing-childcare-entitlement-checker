name: 'Deploy Environment'

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: string
    outputs:
      deploy_url:
        description: "The deployment URL"
        value: ${{ jobs.deploy.outputs.deploy_url }}
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      DEVELOPMENT_BASIC_AUTH_PASSWORD:
        required: true

jobs:
  deploy:
    name: 'Provision & deploy environment'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      deploy_url: ${{ steps.tf-outputs.outputs.deploy_url }}
    permissions:
      id-token: write
      contents: read
      actions: read

    defaults:
      run:
        working-directory: ./infra/terraform

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      DEPLOY_ZIP_PATH: "../../artifacts/webapp.zip"
      TF_VAR_development_basic_auth_password: ${{ secrets.DEVELOPMENT_BASIC_AUTH_PASSWORD }}

    steps:
    - name: Download Infra Metadata
      uses: actions/download-artifact@v8
      with:
        name: build-infra-metadata
        path: .

    - name: Read Terraform Version
      id: tf-version
      working-directory: .
      run: |
        VERSION=$(jq -r .terraform build-infra-metadata.json)
        echo "TF_VERSION=$VERSION" >> "$GITHUB_ENV"

    - name: Download Infra Package
      uses: actions/download-artifact@v8
      with:
        name: infra-package
        path: ./infra

    - name: Unzip Infra Package
      run: unzip -o infra-package.zip
      working-directory: ./infra

    - name: Download web app artifact
      uses: actions/download-artifact@v8
      with:
        name: web-app
        path: ./artifacts/web-app

    - name: Zip web app
      run: |
        cd ../../artifacts/web-app
        zip -r ../webapp.zip .
      working-directory: ./infra/terraform

    - name: Azure Login (OIDC)
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Set service principal metadata
      continue-on-error: true
      run: |
        az rest --method put --uri "https://management.azure.com/providers/microsoft.managementpartner/partners/6084223?api-version=2018-02-01" --body '{"partnerId": "6084223"}' || true        

    - name: Bootstrap Terraform
      id: bootstrap-tf
      uses: azure/arm-deploy@v2
      with:
        scope: subscription
        region: uksouth
        template: ./infra/bicep/main.bicep
        parameters: ./infra/bicep/environments/${{ inputs.environment }}.params.json

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
      with:
        terraform_wrapper: false
        terraform_version: ${{ env.TF_VERSION }}

    - name: Unlock Terraform State
      working-directory: ./infra
      env:
        ACC_NAME: ${{ steps.bootstrap-tf.outputs.storageAccountName }}
        RG_NAME: ${{ steps.bootstrap-tf.outputs.resourceGroupName }}
      shell: bash
      run: |
        chmod +x scripts/manage-storage-access.sh
        ./scripts/manage-storage-access.sh "$ACC_NAME" "$RG_NAME" "true"

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ steps.bootstrap-tf.outputs.resourceGroupName }}" \
          -backend-config="storage_account_name=${{ steps.bootstrap-tf.outputs.storageAccountName }}"

    - name: Terraform Plan
      run: terraform plan -no-color -out=main.tfplan -var-file="environments/${{ inputs.environment }}.tfvars"

    - name: Terraform Apply
      run: terraform apply -auto-approve main.tfplan

    - name: Read Terraform outputs
      id: tf-outputs
      run: |
        echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
        echo "web_app_name=$(terraform output -raw web_app_name)" >> "$GITHUB_OUTPUT"
        FRONTDOOR_HOSTNAME=$(terraform output -raw frontdoor_hostname)
        echo "frontdoor_hostname=$FRONTDOOR_HOSTNAME" >> "$GITHUB_OUTPUT"
        echo "deploy_url=https://$FRONTDOOR_HOSTNAME" >> "$GITHUB_OUTPUT"
        echo "deploy_sa_name=$(terraform output -raw deployment_storage_account_name)" >> "$GITHUB_OUTPUT"
        echo "deploy_sa_container=$(terraform output -raw deployment_storage_container_name)" >> "$GITHUB_OUTPUT"
        echo "staging_slot_in_use=$(terraform output -raw staging_slot_in_use)" >> "$GITHUB_OUTPUT"

    - name: Lock Terraform State
      if: ${{ always() }}
      working-directory: ./infra
      env:
        ACC_NAME: ${{ steps.bootstrap-tf.outputs.storageAccountName }}
        RG_NAME: ${{ steps.bootstrap-tf.outputs.resourceGroupName }}
      shell: bash
      run: |
        chmod +x scripts/manage-storage-access.sh
        ./scripts/manage-storage-access.sh "$ACC_NAME" "$RG_NAME" "false"

    - name: Unlock Deployment Storage
      working-directory: ./infra
      env:
        ACC_NAME: ${{ steps.tf-outputs.outputs.deploy_sa_name }}
        RG_NAME: ${{ steps.tf-outputs.outputs.resource_group_name }}
      shell: bash
      run: |
        chmod +x scripts/manage-storage-access.sh
        ./scripts/manage-storage-access.sh "$ACC_NAME" "$RG_NAME" "true"

    - name: Upload Deployment package + tag
      env:
        ACC_NAME: ${{ steps.tf-outputs.outputs.deploy_sa_name }}
        RG_NAME: ${{ steps.tf-outputs.outputs.resource_group_name }}
        CONTAINER: ${{ steps.tf-outputs.outputs.deploy_sa_container }}
      run: |
        SA_KEY=$(az storage account keys list --resource-group "$RG_NAME" --account-name "$ACC_NAME" --query "[0].value" -o tsv)
        BLOB="package-${{ github.sha }}.zip"
        
        az storage blob upload \
          --account-name "$ACC_NAME" \
          --account-key "$SA_KEY" \
          --container-name "$CONTAINER" \
          --name "$BLOB" \
          --file "$DEPLOY_ZIP_PATH"
          --overwrite
        
        az storage blob update \
          --account-name "$ACC_NAME" \
          --account-key "$SA_KEY" \
          --container-name "$CONTAINER" \
          --name "$BLOB" \
          --tags "retain=true sha=${{ github.sha }}"

    - name: Deploy package to Web App
      env:
        RG_NAME: ${{ steps.tf-outputs.outputs.resource_group_name }}
        APP_NAME: ${{ steps.tf-outputs.outputs.web_app_name }}
      run: |
        DEPLOY_ARGS=(
          --resource-group "$RG_NAME"
          --name "$APP_NAME"
          --src-path "$DEPLOY_ZIP_PATH"
          --type zip
        )

        if [ "${{ steps.tf-outputs.outputs.staging_slot_in_use }}" == "true" ]; then
          DEPLOY_ARGS+=(--slot staging)
        fi

        az webapp deploy "${DEPLOY_ARGS[@]}"

    - name: Swap Staging to Production
      if: ${{ steps.tf-outputs.outputs.staging_slot_in_use == 'true' }}
      env:
        RG_NAME: ${{ steps.tf-outputs.outputs.resource_group_name }}
        APP_NAME: ${{ steps.tf-outputs.outputs.web_app_name }}
      run: |
        az webapp deployment slot swap \
          --resource-group "$RG_NAME" \
          --name "$APP_NAME" \
          --slot staging \
          --target-slot production

    - name: Demote old retained blobs except current
      env:
        ACC_NAME: ${{ steps.tf-outputs.outputs.deploy_sa_name }}
        RG_NAME: ${{ steps.tf-outputs.outputs.resource_group_name }}
        CONTAINER: ${{ steps.tf-outputs.outputs.deploy_sa_container }}
      run: |
        SA_KEY=$(az storage account keys list --resource-group "$RG_NAME" --account-name "$ACC_NAME" --query "[0].value" -o tsv)
        CURRENT_SHA="${{ github.sha }}"
        
        az storage blob list \
          --account-name "$ACC_NAME" \
          --account-key "$SA_KEY" \
          --container-name "$CONTAINER" \
          --query "[?tags.retain=='true'].[name, tags.sha]" \
          -o tsv | while read -r blob sha; do
        
            if [ "$sha" != "$CURRENT_SHA" ]; then
              echo "Demoting $blob (sha=$sha)"
        
              az storage blob update \
                --account-name "$ACC_NAME" \
                --account-key "$SA_KEY" \
                --container-name "$CONTAINER" \
                --name "$blob" \
                --tags "retain=false sha=$sha"
            fi
        done

    - name: Lock Deployment Storage
      if: ${{ always() }}
      working-directory: ./infra
      env:
        ACC_NAME: ${{ steps.tf-outputs.outputs.deploy_sa_name }}
        RG_NAME: ${{ steps.tf-outputs.outputs.resource_group_name }}
      shell: bash
      run: |
        chmod +x scripts/manage-storage-access.sh
        ./scripts/manage-storage-access.sh  "$ACC_NAME" "$RG_NAME" "false"

    - name: Publish deployment summary
      env:
        RG_NAME: ${{ steps.tf-outputs.outputs.resource_group_name }}
        APP_NAME: ${{ steps.tf-outputs.outputs.web_app_name }}
        FD_HOSTNAME: ${{ steps.tf-outputs.outputs.frontdoor_hostname }}
      run: |
        DEPLOY_URL="https://$FD_HOSTNAME"

        {
          echo "## Deployment Details"
          echo
          echo "* **URL**: [$DEPLOY_URL]($DEPLOY_URL)"
          echo "* **Front Door Hostname**: $FD_HOSTNAME"
          echo "* **Resource Group**: $RG_NAME"
          echo "* **Web App Name**: $APP_NAME"
        } >> "$GITHUB_STEP_SUMMARY"
