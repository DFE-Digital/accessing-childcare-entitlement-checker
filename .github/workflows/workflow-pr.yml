name: PR Validation

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-dotnet:
    name: Validate Dotnet
    uses: ./.github/workflows/build-dotnet.yml
    with:
      publish: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e-tests:
    name: E2E Tests
    needs: validate-dotnet
    uses: ./.github/workflows/run-e2e-tests.yml
    with:
      browser: webkit

  a11y-tests:
    name: A11y Tests
    needs: validate-dotnet
    uses: ./.github/workflows/run-a11y-tests.yml
    with:
      browser: webkit

  validate-infra:
    name: Validate Infrastructure
    uses: ./.github/workflows/build-infra.yml
    with:
      infra-directory: infra

  trivy-scan:
    name: Trivy Security Scan
    uses: ./.github/workflows/run-trivy-scan.yml

