site_name: 'CEC Project Technical Documentation(Feature Test)'
site_url: 'https://dfe-digital.github.io/accessing-childcare-entitlement-checker'
repo_url: 'https://github.com/DFE-Digital/accessing-childcare-entitlement-checker'
repo_name: 'DFE-Digital/accessing-childcare-entitlement-checker'

theme:
  name: material
  custom_dir: resources/tech_docs_template
  logo: logos/govuk-icon-512.png
  favicon: favicons/favicon.ico

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: 'blue'
      accent: 'blue'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: 'blue'
      accent: 'blue'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
plugins:
  - search
nav:
  - Home: index.md
  - Architecture: architecture/index.md
  - Run Guide: development.md
  - Architecture Decision Records: adr/index.md
