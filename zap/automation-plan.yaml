env:
  contexts:
    - name: Application
      urls:
        - ${TARGET_URL}
      includePaths:
        - ${TARGET_URL}.*
jobs:
  - type: alertFilter
    name: "Ignore False Positives and Informational alerts"
    alertFilters:
      - ruleId: 10112
        newRisk: "False Positive"
        context: Application
        parameter: "\\.AspNetCore\\.(Session|Antiforgery\\..*)"
        parameterRegex: true
      - ruleId: 10109
        newRisk: "False Positive"
        context: Application
      - ruleId: 2
        newRisk: "False Positive"
        context: Application
        url: ".*favicon\\.svg.*"
        urlRegex: true
      - ruleId: 10096
        newRisk: "False Positive"
        context: Application
        url: ".*govuk-frontend\\.min\\.css.*"
        urlRegex: true

  - type: script
    parameters:
      action: add
      type: httpsender
      name: auth-header
      engine: ECMAScript
      file: /zap/wrk/zap/auth-header.js

  - type: spider
    parameters:
      context: Application
      maxDuration: 20

  - type: spiderAjax
    parameters:
      context: Application
      browserId: firefox-headless
      maxDuration: 20
      maxCrawlDepth: 0
      numberOfBrowsers: 1

  - type: passiveScan-wait

  - type: activeScan
    parameters:
      context: Application
      maxScanDurationInMins: 60

  - type: report
    parameters:
      template: traditional-md
      reportDir: /zap/wrk/zap
      reportFile: zap-report.md

  - type: report
    parameters:
      template: sarif-json
      reportDir: /zap/wrk/zap
      reportFile: zap-results.sarif.json